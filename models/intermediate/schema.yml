version: 2

models:
  - name: int_orders_items
    description: "Pedidos enriquecidos com produtos, categorias e transportadoras. Granularidade: uma linha por item de pedido."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: employee_id
        tests:
          - not_null
      - name: revenue
        tests:
          - not_null

  - name: int_employees_territories
    description: "Funcionários enriquecidos com territórios e regiões. Granularidade: uma linha por funcionário."
    columns:
      - name: employee_id
        tests:
          - unique
          - not_null

  - name: int_products_suppliers
    description: "Produtos enriquecidos com fornecedores e categorias."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: int_customer_orders
    description: "Métricas de comportamento por cliente."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: int_employee_sales
    description: "Métricas de vendas por funcionário."
    columns:
      - name: employee_id
        tests:
          - unique
          - not_null
